services:
  - type: web
    name: obs-graphql
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/render/app-with-datadog/Dockerfile
    dockerContext: .
    domains:
      - graphql.obs-playground.com
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_WORKDIR
        value: apps/graphql-server
      - key: APP_START_COMMAND
        value: npm run start
      - key: DD_API_KEY
        sync: false
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_HOSTNAME
        value: obs-graphql
      - key: EXPRESS_BASE_URL
        value: https://api.obs-playground.com
      - key: HONEYCOMB_ENDPOINT
        value: https://api.honeycomb.io
      - key: GRAFANA_OTLP_ENDPOINT
        value: https://otlp-gateway-prod-us-east-0.grafana.net/otlp
      - fromGroup: obs-playground
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - turbo.json
        - patches/**
        - .dockerignore
        - deploy/render/app-with-datadog/**
        - apps/graphql-server/**
        - packages/**

  - type: web
    name: obs-express
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/render/app-with-datadog/Dockerfile
    dockerContext: .
    domains:
      - api.obs-playground.com
    previews:
      generation: automatic
    disk:
      name: express-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_WORKDIR
        value: apps/express-server
      - key: APP_START_COMMAND
        value: npm run start
      - key: SQLITE_PATH
        value: /var/data/app.db
      - key: DD_API_KEY
        sync: false
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_HOSTNAME
        value: obs-express
      - key: GRAPHQL_BASE_URL
        value: https://graphql.obs-playground.com
      - key: HONEYCOMB_ENDPOINT
        value: https://api.honeycomb.io
      - key: GRAFANA_OTLP_ENDPOINT
        value: https://otlp-gateway-prod-us-east-0.grafana.net/otlp
      - fromGroup: obs-playground
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - turbo.json
        - patches/**
        - .dockerignore
        - deploy/render/app-with-datadog/**
        - apps/express-server/**
        - packages/**

  - type: web
    name: obs-nextjs
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/app-with-datadog/Dockerfile
    dockerContext: .
    domains:
      - obs-playground.com
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_WORKDIR
        value: apps/nextjs-app
      - key: APP_START_COMMAND
        value: npm run start
      - key: DD_API_KEY
        sync: false
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_HOSTNAME
        value: obs-nextjs
      - key: GRAPHQL_BASE_URL
        value: https://graphql.obs-playground.com
      - key: EXPRESS_BASE_URL
        value: https://api.obs-playground.com
      - key: NEXT_PUBLIC_GRAPHQL_BASE_URL
        value: https://graphql.obs-playground.com
      - key: HONEYCOMB_ENDPOINT
        value: https://api.honeycomb.io
      - key: GRAFANA_OTLP_ENDPOINT
        value: https://otlp-gateway-prod-us-east-0.grafana.net/otlp
      - key: DATADOG_APP_ID
        sync: false
      - key: DATADOG_CLIENT_TOKEN
        sync: false
      - fromGroup: obs-playground
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - turbo.json
        - patches/**
        - .dockerignore
        - deploy/render/app-with-datadog/**
        - apps/nextjs-app/**
        - packages/**

  - type: web
    name: obs-nextjs-custom
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/app-with-datadog/Dockerfile
    dockerContext: .
    domains:
      - next-custom.obs-playground.com
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CUSTOM_SERVER
        value: "true"
      - key: APP_WORKDIR
        value: apps/nextjs-app
      - key: APP_START_COMMAND
        value: npm run start:custom
      - key: DD_API_KEY
        sync: false
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_HOSTNAME
        value: obs-nextjs-custom
      - key: GRAPHQL_BASE_URL
        value: https://graphql.obs-playground.com
      - key: EXPRESS_BASE_URL
        value: https://api.obs-playground.com
      - key: NEXT_PUBLIC_GRAPHQL_BASE_URL
        value: https://graphql.obs-playground.com
      - key: HONEYCOMB_ENDPOINT
        value: https://api.honeycomb.io
      - key: GRAFANA_OTLP_ENDPOINT
        value: https://otlp-gateway-prod-us-east-0.grafana.net/otlp
      - key: DATADOG_APP_ID
        sync: false
      - key: DATADOG_CLIENT_TOKEN
        sync: false
      - fromGroup: obs-playground
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - turbo.json
        - patches/**
        - .dockerignore
        - deploy/render/app-with-datadog/**
        - apps/nextjs-app/**
        - packages/**

