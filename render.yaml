services:
  - type: web
    name: obs-graphql
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/app-with-datadog/Dockerfile
    dockerContext: .
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_START_COMMAND
        value: node apps/graphql-server/dist/index.js
      - key: DD_API_KEY
        sync: false
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_HOSTNAME
        value: obs-graphql
      - key: EXPRESS_BASE_URL
        fromService:
          name: obs-express
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: HONEYCOMB_ENDPOINT
        value: https://api.honeycomb.io
      - key: GRAFANA_OTLP_ENDPOINT
        value: https://otlp-gateway-prod-us-east-0.grafana.net/otlp
      - key: SENTRY_OTLP_ENDPOINT
        value: https://o4510253247823872.ingest.us.sentry.io/api/4510253248937984/integration/otlp
      - fromGroup: obs-playground
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - turbo.json
        - patches/**
        - .dockerignore
        - deploy/render/app-with-datadog/**
        - apps/graphql-server/**
        - packages/**

