name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      datadog-agent:
        image: datadog/agent:7
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: datadoghq.com
          DD_HOSTNAME: github-actions
          DD_APM_ENABLED: "true"
          DD_LOGS_ENABLED: "true"
          DD_OTLP_CONFIG_LOGS_ENABLED: "true"
          DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT: 0.0.0.0:4318
          HOST_PROC: /proc
        ports:
          - 4318:4318

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env files
        run: |
          cat > .env << EOF
          # OTEL backends
          HONEYCOMB_ENDPOINT=${{ secrets.HONEYCOMB_ENDPOINT }}
          HONEYCOMB_API_KEY=${{ secrets.HONEYCOMB_API_KEY }}
          GRAFANA_OTLP_ENDPOINT=${{ secrets.GRAFANA_OTLP_ENDPOINT }}
          GRAFANA_OTLP_AUTH=${{ secrets.GRAFANA_OTLP_AUTH }}
          DATADOG_OTLP_ENDPOINT=http://localhost:4318
          SENTRY_OTLP_ENDPOINT=${{ secrets.SENTRY_OTLP_ENDPOINT }}
          SENTRY_AUTH=${{ secrets.SENTRY_AUTH }}
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          EOF

          cat > apps/nextjs-app/.env.local << EOF
          # OTEL backends
          HONEYCOMB_ENDPOINT=${{ secrets.HONEYCOMB_ENDPOINT }}
          HONEYCOMB_API_KEY=${{ secrets.HONEYCOMB_API_KEY }}
          GRAFANA_OTLP_ENDPOINT=${{ secrets.GRAFANA_OTLP_ENDPOINT }}
          GRAFANA_OTLP_AUTH=${{ secrets.GRAFANA_OTLP_AUTH }}
          DATADOG_OTLP_ENDPOINT=http://localhost:4318
          SENTRY_OTLP_ENDPOINT=${{ secrets.SENTRY_OTLP_ENDPOINT }}
          SENTRY_AUTH=${{ secrets.SENTRY_AUTH }}
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          EOF

      - name: Wait for Datadog Agent OTLP endpoint
        run: |
          echo "Waiting for Datadog Agent OTLP endpoint..."
          for i in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/4318) >/dev/null 2>&1; then
              echo "Datadog Agent OTLP endpoint is ready"
              break
            fi
            echo "Waiting for Datadog Agent... ($i/60)"
            sleep 1
          done

          (echo > /dev/tcp/127.0.0.1/4318) >/dev/null 2>&1 || (echo "Datadog Agent failed to start" && exit 1)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build all services
        run: npm run build

      - name: Start all services
        run: npm start &
        env:
          CI: true
          PORTLESS_HTTPS: 0
          PORTLESS_PORT: 8080

      - name: Wait for services to be healthy
        run: |
          eval "$(node scripts/portless-env.mjs shell)"
          echo "Waiting for services to start..."

          # Wait for Express server
          for i in {1..60}; do
            if curl -s "${EXPRESS_BASE_URL}/health" > /dev/null 2>&1; then
              echo "Express server is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then echo "Express server failed to start" && exit 1; fi
            echo "Waiting for Express server... ($i/60)"
            sleep 1
          done

          # Wait for GraphQL server
          for i in {1..60}; do
            if curl -s -X POST "${GRAPHQL_BASE_URL}/graphql" -H 'Content-Type: application/json' -d '{"query":"{__typename}"}' > /dev/null 2>&1; then
              echo "GraphQL server is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then echo "GraphQL server failed to start" && exit 1; fi
            echo "Waiting for GraphQL server... ($i/60)"
            sleep 1
          done

          # Wait for normal mode URL
          for i in {1..60}; do
            if curl -s "${BASE_URL}" > /dev/null 2>&1; then
              echo "Normal mode URL is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then echo "Normal mode URL failed to start" && exit 1; fi
            echo "Waiting for normal mode URL... ($i/60)"
            sleep 1
          done

          # Wait for custom mode URL
          for i in {1..60}; do
            if curl -s "${CUSTOM_URL}" > /dev/null 2>&1; then
              echo "Custom mode URL is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then echo "Custom mode URL failed to start" && exit 1; fi
            echo "Waiting for custom mode URL... ($i/60)"
            sleep 1
          done

          # Wait for TanStack URL
          for i in {1..60}; do
            if curl -s "${TANSTACK_URL}" > /dev/null 2>&1; then
              echo "TanStack URL is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then echo "TanStack URL failed to start" && exit 1; fi
            echo "Waiting for TanStack URL... ($i/60)"
            sleep 1
          done

          echo "All services are ready!"
        env:
          PORTLESS_HTTPS: 0
          PORTLESS_PORT: 8080

      - name: Run Playwright tests (normal mode)
        run: npm run playwright:normal
        env:
          PORTLESS_HTTPS: 0
          PORTLESS_PORT: 8080
          PLAYWRIGHT_OUTPUT_DIR: test-results-normal
          PLAYWRIGHT_HTML_REPORT: playwright-report-normal

      - name: Upload Playwright artifacts (normal mode)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-normal
          path: |
            packages/playwright-tests/test-results-normal
            packages/playwright-tests/playwright-report-normal
          retention-days: 7
          if-no-files-found: ignore

      - name: Run Playwright tests (custom mode)
        run: npm run playwright:custom
        env:
          PORTLESS_HTTPS: 0
          PORTLESS_PORT: 8080
          PLAYWRIGHT_OUTPUT_DIR: test-results-custom
          PLAYWRIGHT_HTML_REPORT: playwright-report-custom

      - name: Upload Playwright artifacts (custom mode)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-custom
          path: |
            packages/playwright-tests/test-results-custom
            packages/playwright-tests/playwright-report-custom
          retention-days: 7
          if-no-files-found: ignore

      - name: Run Playwright tests (TanStack)
        run: npm run playwright:tanstack
        env:
          PORTLESS_HTTPS: 0
          PORTLESS_PORT: 8080
          PLAYWRIGHT_OUTPUT_DIR: test-results-tanstack
          PLAYWRIGHT_HTML_REPORT: playwright-report-tanstack

      - name: Upload Playwright artifacts (TanStack)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-tanstack
          path: |
            packages/playwright-tests/test-results-tanstack
            packages/playwright-tests/playwright-report-tanstack
          retention-days: 7
          if-no-files-found: ignore
