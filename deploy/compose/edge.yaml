services:
  edge:
    image: caddy:2.10-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ../router/Caddyfile.edge:/etc/caddy/Caddyfile:ro
      - ${EDGE_ROUTES_DIR:-/srv/obs/edge/routes}:/etc/caddy/routes:ro
      - edge-data:/data
      - edge-config:/config

volumes:
  edge-data:
  edge-config:
